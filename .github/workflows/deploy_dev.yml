name: Deploy to Staging (Dev)

on:
  push:
    branches:
      - 'dev/*'

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      - name: Run Unit Tests
        run: pytest tests/

      - name: Run Codebase QA Audit (Coverage)
        run: python scripts/qa/audit_coverage.py

  deploy:
    needs: test-and-audit
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging Server
        run: echo "Deploying to staging environment for testing..."
