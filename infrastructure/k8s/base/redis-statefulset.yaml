apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infraindex-redis
  namespace: default
spec:
  serviceName: "infraindex-redis"
  replicas: 1
  selector:
    matchLabels:
      app: infraindex-redis
  template:
    metadata:
      labels:
        app: infraindex-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
          - redis-server
          - "--maxmemory"
          - "256mb"
          - "--maxmemory-policy"
          - "allkeys-lru"
          - "--appendonly"
          - "yes"
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: infraindex-redis
  namespace: default
spec:
  ports:
  - port: 6379
    targetPort: 6379
  clusterIP: None
  selector:
    app: infraindex-redis
