apiVersion: v1
kind: Secret
metadata:
  name: infraindex-secret
  namespace: default
type: Opaque
stringData:
  # In a real environment, use SealedSecrets or external secret manager (AWS Secrets Manager)
  POSTGRES_PASSWORD: "CHANGE_ME_STRONG_PASSWORD_K8S"
  DATABASE_URL: "postgresql+asyncpg://infraindex:CHANGE_ME_STRONG_PASSWORD_K8S@infraindex-db:5432/infraindex"
  ADMIN_API_KEY: "CHANGE_ME_RANDOM_SECRET_KEY_MIN_32_CHARS"
  JWT_SECRET_KEY: "CHANGE_ME_JWT_SECRET_KEY"
