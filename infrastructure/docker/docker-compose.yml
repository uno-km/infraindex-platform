version: '3.8'

services:
  db:
    image: postgres:16-alpine
    # PostgreSQL 성능 튜닝 (개발/소규모 서버 기준)
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c log_min_duration_statement=1000
    environment:
      # FIX-03: 하드코딩 비밀번호 제거. 반드시 .env 파일 또는 환경변수로 주입할 것.
      POSTGRES_USER: ${POSTGRES_USER:-infraindex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-infraindex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infraindex}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # maxmemory: 수집 데이터 캐싱 + pub/sub 용도
    # allkeys-lru: 메모리 초과 시 LRU 순서로 자동 eviction
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 300
      --timeout 0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-infraindex}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-infraindex}
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["http://localhost:3000"]}
      - ADMIN_API_KEY=${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      - USE_REAL_DB=True
      # Redis Pool 튜닝 (docker 환경)
      - REDIS_MAX_CONNECTIONS=50
      # DB Pool 튜닝
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=20
      - DB_POOL_RECYCLE=1800
      # 보안: TrustedHost (개발 로컬에서는 빈 값 = 비활성화)
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-infraindex}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-infraindex}
      - REDIS_URL=redis://redis:6379/0
      - USE_REAL_DB=True
      - USE_CELERY_QUEUE=True
      - ENABLE_ALERTS=${ENABLE_ALERTS:-False}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    command: celery -A apps.worker.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-infraindex}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-infraindex}
      - REDIS_URL=redis://redis:6379/0
      - USE_REAL_DB=True
      - USE_CELERY_QUEUE=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

